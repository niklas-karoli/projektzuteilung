<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Projektzuteilung 2026</title>
    <style>
      #root:empty::before {
        content: 'Initialisiere...';
        display: flex; justify-content: center; align-items: center; height: 100vh;
        font-family: sans-serif; color: #666;
      }
      #error-display {
        display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: white; color: #d32f2f; padding: 20px; z-index: 9999;
        font-family: sans-serif; overflow: auto;
      }
      pre { background: #eee; padding: 10px; overflow: auto; }
      button { padding: 10px 20px; cursor: pointer; }
    </style>
    <script>
      (function() {
        console.log("Bootstrap-Script geladen");
        console.log("Current URL:", window.location.href);
        console.log("Base URI:", document.baseURI);

        function showErr(title, msg, stack) {
          var d = document.getElementById('error-display');
          if (!d) return;
          d.style.display = 'block';
          d.innerHTML = '<h1>' + title + '</h1><p>' + msg + '</p>' +
            (stack ? '<pre>' + stack + '</pre>' : '') +
            '<button onclick="location.reload(true)">Neu laden</button>' +
            '<button onclick="localStorage.clear(); sessionStorage.clear(); location.reload(true)" style="margin-left:10px">Reset & Neu laden</button>';
        }

        window.onerror = function(m, u, l, c, e) {
          showErr('Ladefehler', m, e ? e.stack : 'URL: ' + u + '\nL:' + l + ' C:' + c);
          return false;
        };

        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            for(var r of regs) r.unregister();
          });
        }
      })();
    </script>
  </head>
  <body class="antialiased text-gray-900">
    <div id="error-display"></div>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        var display = document.getElementById('error-display');
        display.style.display = 'block';
        display.innerHTML = '<h1>Fehler beim Laden der Seite</h1>' +
          '<p>' + msg + '</p>' +
          '<p>URL: ' + url + '</p>' +
          '<p>Zeile: ' + line + ', Spalte: ' + col + '</p>' +
          (error && error.stack ? '<pre>' + error.stack + '</pre>' : '');
      };

      // Unregister service workers and clear caches that might interfere
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(var registration of registrations) {
            registration.unregister();
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var name of names) caches.delete(name);
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

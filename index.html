<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Projektzuteilung 2026</title>
    <style>
      #root:empty::before {
        content: 'Lädt... (wenn dies länger als 5 Sekunden dauert, liegt ein Fehler vor)';
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        color: #666;
        text-align: center;
        padding: 20px;
      }
      #error-display {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: white;
        color: #d32f2f;
        padding: 20px;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: auto;
      }
      #error-display h1 { margin-top: 0; }
      #error-display pre {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 4px;
        overflow-x: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
      }
      #error-display button {
        background: #2196f3;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
      }
    </style>
    <script>
      (function() {
        console.log("Fehler-Überwachung initialisiert");
        function showDisplay(title, msg, stack) {
          var display = document.getElementById('error-display');
          if (!display) {
            alert(title + "\n" + msg);
            return;
          }
          display.style.display = 'block';
          display.innerHTML = '<h1>' + title + '</h1>' +
            '<p><strong>Nachricht:</strong> ' + msg + '</p>' +
            (stack ? '<h2>Stacktrace:</h2><pre>' + stack + '</pre>' : '') +
            '<button onclick="location.reload(true)">Seite neu laden</button>' +
            '<button onclick="localStorage.clear(); sessionStorage.clear(); location.reload(true)" style="margin-left: 10px; background: #f44336;">Daten zurücksetzen & neu laden</button>';
        }

        window.onerror = function(msg, url, line, col, error) {
          showDisplay('Laufzeitfehler', msg, (error && error.stack) ? error.stack : 'URL: ' + url + '\nZeile: ' + line + ', Spalte: ' + col);
          return false;
        };

        window.onunhandledrejection = function(event) {
          showDisplay('Asynchroner Fehler (Promise Rejection)', event.reason, (event.reason && event.reason.stack) ? event.reason.stack : null);
        };

        // Unregister service workers and clear caches
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(var registration of registrations) { registration.unregister(); }
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (var name of names) caches.delete(name);
          });
        }
      })();
    </script>
  </head>
  <body class="antialiased text-gray-900">
    <div id="error-display"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
